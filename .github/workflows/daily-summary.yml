name: Stellan Daily Summary

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Stellan daily summary
        run: |
          curl -X POST \
            'https://awnkhvbyjfauvypxxkjl.supabase.co/functions/v1/daily-summary' \
            -H 'Authorization: Bearer ${{ secrets.CRON_SECRET }}' \
            -H 'Content-Type: application/json' \
            -d '{}'
