name: Daily Brief

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate Brief
        run: python scripts/generate_daily_brief.py
      - name: Commit changes
        run: |
          git config user.name "Stellan"
          git config user.email "stellan@geoterra.hr"
          git add 0 MOZAK/brief.md
          git diff --staged --quiet || git commit -m "🤖 Auto: Daily brief (v2.2)" && git push || echo "No changes"
