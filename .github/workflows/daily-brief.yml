name: Daily Brief
 
on:
  schedule:
    - cron: '0 6 * * *'   # Svaki dan u 8:00 po hrvatskom vremenu
  workflow_dispatch:

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Generate Daily Brief
        run: python scripts/generate_daily_brief.py > 0 MOZAK/brief.md
        
      - name: Commit and push
        run: |
          git config user.name "Stellan"
          git config user.email "stellan@geoterra.hr"
          git add 0 MOZAK/brief.md
          git commit -m "🤖 Auto daily brief (v2.3)" || echo "No changes"
          git push
