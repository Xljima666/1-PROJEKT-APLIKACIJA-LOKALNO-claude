name: Supabase Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Push migrations and deploy edge functions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SUPABASE_CLI_VERSION: 2.93.0
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      FALLBACK_SUPABASE_PROJECT_ID: hkdxpehnvcajgfkfdijg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve Supabase project
        shell: bash
        run: |
          missing=0

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing GitHub secret SUPABASE_ACCESS_TOKEN"
            missing=1
          fi

          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing GitHub secret SUPABASE_DB_PASSWORD"
            missing=1
          fi

          if [ -n "$SUPABASE_PROJECT_ID" ]; then
            echo "PROJECT_REF=$SUPABASE_PROJECT_ID" >> "$GITHUB_ENV"
          else
            echo "PROJECT_REF=$FALLBACK_SUPABASE_PROJECT_ID" >> "$GITHUB_ENV"
          fi

          exit "$missing"

      - name: Link Supabase project
        run: npx --yes supabase@${SUPABASE_CLI_VERSION} link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        run: npx --yes supabase@${SUPABASE_CLI_VERSION} db push --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Deploy edge functions
        run: npx --yes supabase@${SUPABASE_CLI_VERSION} functions deploy --project-ref "$PROJECT_REF" --use-api
