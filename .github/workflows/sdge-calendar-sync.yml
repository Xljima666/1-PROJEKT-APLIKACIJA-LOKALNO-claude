name: SDGE Calendar Sync

on:
  schedule:
    - cron: "15 5,11,15 * * 1-5"
  workflow_dispatch:

jobs:
  sync-sdge-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger SDGE calendar sync
        run: |
          set -euo pipefail
          response="$(curl --fail-with-body -sS -X POST \
            'https://awnkhvbyjfauvypxxkjl.supabase.co/functions/v1/sync-sdge' \
            -H 'x-internal-secret: ${{ secrets.CRON_SECRET }}' \
            -H 'Content-Type: application/json' \
            -d '{}')"
          echo "$response"
